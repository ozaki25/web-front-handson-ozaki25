<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400" font-family="system-ui, sans-serif" font-size="13">
  <style>
    text { fill: #1e293b; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e2e8f0; }
      .bg { fill: #1e293b; }
      .lane { fill: #334155; }
      .label-bg { fill: #475569; }
    }
    .bg { fill: #f8fafc; }
    .lane { fill: #e2e8f0; }
    .label-bg { fill: #64748b; }
    .label-text { fill: #ffffff; font-weight: 600; }
    .arrow { stroke: #3b82f6; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .arrow-deny { stroke: #ef4444; stroke-width: 1.5; fill: none; stroke-dasharray: 5,3; marker-end: url(#ah-deny); }
    .arrow-ok { stroke: #22c55e; stroke-width: 1.5; fill: none; marker-end: url(#ah-ok); }
    .lifeline { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4,4; }
    .box-blue { fill: #dbeafe; stroke: #3b82f6; stroke-width: 1; rx: 4; }
    .box-green { fill: #dcfce7; stroke: #22c55e; stroke-width: 1; rx: 4; }
    .box-red { fill: #fee2e2; stroke: #ef4444; stroke-width: 1; rx: 4; }
    .step-num { fill: #64748b; font-size: 11px; }
    .note { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="ah-deny" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/>
    </marker>
    <marker id="ah-ok" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- background -->
  <rect class="bg" width="640" height="400" rx="8"/>

  <!-- actors -->
  <rect class="label-bg" x="60" y="14" width="110" height="28" rx="4"/>
  <text class="label-text" x="115" y="33" text-anchor="middle">ブラウザ</text>

  <rect class="label-bg" x="470" y="14" width="110" height="28" rx="4"/>
  <text class="label-text" x="525" y="33" text-anchor="middle">サーバー</text>

  <!-- lifelines -->
  <line class="lifeline" x1="115" y1="42" x2="115" y2="390"/>
  <line class="lifeline" x1="525" y1="42" x2="525" y2="390"/>

  <!-- ===== CASE A: プリフライト成功 ===== -->
  <text x="20" y="75" font-size="11" fill="#64748b" font-weight="600">■ プリフライトあり (PUT / JSON 等)</text>

  <!-- Step 1: OPTIONS -->
  <text class="step-num" x="80" y="100">① OPTIONS</text>
  <line class="arrow" x1="115" y1="105" x2="515" y2="105"/>
  <rect class="box-blue" x="270" y="90" width="100" height="20" rx="3"/>
  <text x="320" y="104" text-anchor="middle" font-size="11" fill="#1e40af">OPTIONS /api</text>

  <!-- Step 2: 204 OK -->
  <text class="step-num" x="410" y="130">② 204 + Allow headers</text>
  <line class="arrow-ok" x1="525" y1="135" x2="125" y2="135"/>
  <rect class="box-green" x="270" y="120" width="100" height="20" rx="3"/>
  <text x="320" y="134" text-anchor="middle" font-size="11" fill="#166534">Allow: PUT ✓</text>

  <!-- Step 3: PUT -->
  <text class="step-num" x="80" y="165">③ PUT（本リクエスト）</text>
  <line class="arrow" x1="115" y1="170" x2="515" y2="170"/>
  <rect class="box-blue" x="270" y="155" width="100" height="20" rx="3"/>
  <text x="320" y="169" text-anchor="middle" font-size="11" fill="#1e40af">PUT /api</text>

  <!-- Step 4: 200 -->
  <text class="step-num" x="410" y="195">④ 200 OK</text>
  <line class="arrow-ok" x1="525" y1="200" x2="125" y2="200"/>
  <rect class="box-green" x="270" y="185" width="100" height="20" rx="3"/>
  <text x="320" y="199" text-anchor="middle" font-size="11" fill="#166534">200 OK ✓</text>

  <!-- Max-Age note -->
  <rect class="note" x="22" y="215" width="190" height="30" rx="4"/>
  <text x="117" y="228" text-anchor="middle" font-size="11" fill="#92400e">Max-Age: 3600 → キャッシュ</text>
  <text x="117" y="241" text-anchor="middle" font-size="11" fill="#92400e">次回は OPTIONS をスキップ</text>

  <!-- ===== CASE B: プリフライト拒否 ===== -->
  <text x="20" y="275" font-size="11" fill="#64748b" font-weight="600">■ プリフライト拒否（Allow-Origin 不一致）</text>

  <!-- Step 1b: OPTIONS -->
  <text class="step-num" x="80" y="300">① OPTIONS</text>
  <line class="arrow" x1="115" y1="305" x2="515" y2="305"/>

  <!-- Step 2b: 403 / no header -->
  <text class="step-num" x="380" y="330">② 403 or ヘッダなし</text>
  <line class="arrow-deny" x1="525" y1="335" x2="125" y2="335"/>
  <rect class="box-red" x="265" y="320" width="110" height="20" rx="3"/>
  <text x="320" y="334" text-anchor="middle" font-size="11" fill="#991b1b">Allow-Origin なし ✗</text>

  <!-- Step 3b: blocked -->
  <rect class="box-red" x="35" y="355" width="160" height="22" rx="4"/>
  <text x="115" y="370" text-anchor="middle" font-size="12" fill="#991b1b">本リクエストはブロック</text>

  <!-- シンプルリクエスト note -->
  <rect class="note" x="340" y="355" width="270" height="30" rx="4"/>
  <text x="475" y="368" text-anchor="middle" font-size="11" fill="#92400e">シンプルリクエスト (GET / POST form) は</text>
  <text x="475" y="381" text-anchor="middle" font-size="11" fill="#92400e">OPTIONS なしで直接リクエストが飛ぶ</text>
</svg>
